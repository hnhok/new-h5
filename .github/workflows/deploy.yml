name: Deploy H5 to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 由于前端和后端用的是同一个 IP 和密钥，你需要在 new-h5 的 Settings/Secrets 里配置同样的 SERVER_HOST/USER/PASSWORD
    - name: Copy files via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "."
        target: "/app/cms-h5"
        rm: true

    - name: Build and Run Docker
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd /app/cms-h5
          
          # H5 项目同样加入 Docker 内网加速
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json <<-'EOF'
          {
            "registry-mirrors": [
              "https://mirror.baidubce.com",
              "https://docker.m.daocloud.io",
              "https://dockerproxy.com"
            ]
          }
          EOF
          sudo systemctl restart docker || true

          sudo docker stop cms-h5 || true
          sudo docker rm cms-h5 || true
          # 编译包含 Nginx 的环境
          sudo docker build -t cms-h5 .
          # H5 探索端运行在 8080 端口（防止与前端后台的 80 冲突）
          sudo docker run -d --name cms-h5 -p 8080:80 --restart always cms-h5
